<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>個人決策風格問卷</title>
<meta name="description" content="三軸 × 27 型。30 題，約 5-8 分鐘。找出你的做事風格、能量來源、內心羅盤。">
<meta property="og:title" content="個人決策風格問卷">
<meta property="og:description" content="30 題找出你的決策風格">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a10;--bg2:#13131d;--bg3:#1c1c2a;--bg4:#262638;--tx:#eeeef5;--tx2:#9898ac;--tx3:#5c5c72;--bd:#2a2a3e;--r:14px;--a1:#7c6cf0;--a2:#a69bff;--ok:#2ecc71;--wn:#f1c40f;--er:#e74c3c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--tx);line-height:1.75;-webkit-font-smoothing:antialiased}
.wrap{max-width:680px;margin:0 auto;padding:16px}
.hidden{display:none!important}

/* Header */
.hdr{text-align:center;padding:48px 0 36px}
.hdr h1{font-family:"Space Grotesk",sans-serif;font-size:1.6rem;font-weight:700;letter-spacing:2px;color:var(--a2)}
.hdr .sub{color:var(--tx3);font-size:.88rem;margin-top:6px}

/* Welcome */
.hero{text-align:center;margin-bottom:24px}
.hero h2{font-size:1.35rem;font-weight:700;margin-bottom:6px;color:var(--tx)}
.hero p{color:var(--tx2);font-size:.9rem}
.info{background:var(--bg2);border-radius:var(--r);padding:22px;margin-bottom:16px;border:1px solid var(--bd)}
.info h3{font-size:1rem;font-weight:600;margin-bottom:12px}
.info p{color:var(--tx2);font-size:.88rem;margin-bottom:8px}
.info p:last-child{margin-bottom:0}

/* Button */
.btn{display:block;width:100%;padding:16px;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-go{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,108,240,.35)}
.btn-go:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;transform:none;box-shadow:none}
.btn-alt{background:transparent;color:var(--a2);border:2px solid var(--a1);margin-top:12px}
.btn-alt:hover{background:rgba(124,108,240,.1)}

/* Progress */
.prog{position:sticky;top:0;z-index:50;background:var(--bg);padding:14px 0 10px;border-bottom:1px solid var(--bd)}
.prog-bar{background:var(--bg3);border-radius:5px;height:6px;overflow:hidden}
.prog-fill{background:linear-gradient(90deg,var(--a1),var(--a2));height:100%;width:0;transition:width .35s}
.prog-txt{text-align:center;color:var(--tx3);font-size:.8rem;margin-top:8px}

/* Question */
.qcard{background:var(--bg2);border-radius:var(--r);padding:22px;margin-bottom:14px;border:2px solid transparent;transition:border-color .3s}
.qcard.done{border-color:var(--a1)}
.qnum{font-family:"Space Grotesk",sans-serif;font-size:.75rem;color:var(--tx3);letter-spacing:1px;margin-bottom:8px}
.qtxt{font-size:.95rem;font-weight:500;margin-bottom:16px;line-height:1.8}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;padding:14px;background:var(--bg);border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent}
.opt:hover{background:var(--bg3);border-color:var(--bd)}
.opt.sel{background:rgba(124,108,240,.12);border-color:var(--a1)}
.opt input{display:none}
.dot{width:20px;height:20px;border:2px solid var(--tx3);border-radius:50%;margin-right:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:border-color .2s}
.opt.sel .dot{border-color:var(--a1)}
.opt.sel .dot::after{content:"";width:10px;height:10px;background:var(--a1);border-radius:50%}
.opt-t{font-size:.9rem;color:var(--tx2);line-height:1.7}
.opt.sel .opt-t{color:var(--tx)}

/* Results */
.res-section{margin-bottom:20px}
.res-card{background:var(--bg2);border-radius:var(--r);padding:24px;margin-bottom:16px;border:1px solid var(--bd)}
.res-card h3{font-size:1.05rem;font-weight:600;margin-bottom:16px}

/* Type Header */
.type-hdr{text-align:center;padding:32px 20px;border-radius:var(--r);margin-bottom:20px;position:relative;overflow:hidden}
.type-code{font-family:"Space Grotesk",sans-serif;font-size:2.8rem;font-weight:700;letter-spacing:6px;margin-bottom:6px}
.type-name{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.type-en{font-size:.85rem;color:var(--tx2)}

/* Axis bars */
.axis{margin-bottom:18px}
.axis-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.82rem}
.axis-label span:first-child{color:var(--tx2)}
.axis-label span:last-child{font-family:"Space Grotesk",sans-serif;font-weight:600}
.axis-track{position:relative;height:32px;background:var(--bg);border-radius:16px;overflow:hidden}
.axis-center{position:absolute;left:50%;top:0;width:2px;height:100%;background:var(--tx3);opacity:.3;transform:translateX(-1px)}
.axis-fill{position:absolute;top:0;height:100%;border-radius:16px;transition:all .6s ease-out}
.axis-marker{position:absolute;top:50%;width:14px;height:14px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(0,0,0,.5);transition:left .6s ease-out;z-index:2}
.axis-ends{display:flex;justify-content:space-between;font-size:.72rem;color:var(--tx3);margin-top:6px;padding:0 4px}
.axis-val{text-align:center;margin-top:4px}
.axis-val span{font-family:"Space Grotesk",sans-serif;font-size:1.5rem;font-weight:700}

/* Type desc */
.type-desc{font-size:.92rem;color:var(--tx2);line-height:2;padding:18px;background:var(--bg);border-radius:10px;border-left:3px solid var(--a1);margin-bottom:16px}
.type-detail{margin-bottom:20px}
.type-detail h4{font-size:.95rem;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.type-detail p{font-size:.88rem;color:var(--tx2);line-height:1.8;padding:12px;background:var(--bg);border-radius:8px}

/* Share */
.share-box{background:var(--bg2);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:16px;border:1px solid var(--bd)}
.share-box p{color:var(--tx2);font-size:.85rem;margin-bottom:12px}
.share-code{font-family:"Space Grotesk",sans-serif;font-size:1.1rem;font-weight:600;color:var(--a2);background:var(--bg);padding:10px 20px;border-radius:8px;display:inline-block;letter-spacing:3px;cursor:pointer;transition:all .2s}
.share-code:hover{background:var(--bg3)}
.copied{color:var(--ok)!important}

/* Footer */
.ftr{text-align:center;padding:32px 0 16px;color:var(--tx3);font-size:.75rem}
.ftr a{color:var(--a2);text-decoration:none}

@media(max-width:500px){
  .wrap{padding:12px}
  .hdr h1{font-size:1.3rem}
  .type-code{font-size:2.2rem}
  .axis-ends{font-size:.65rem}
}
</style>
</head>
<body>
<div class="wrap">

<header class="hdr">
  <h1>個人決策風格問卷</h1>
  <p class="sub">三軸定位 · 30 題 · 約 5-8 分鐘</p>
</header>

<div id="welcome">
  <div class="hero">
    <h2>你做事的風格是什麼？</h2>
    <p>從日常行為找出你的傾向，不問你「是什麼人」，只看你「怎麼做」</p>
  </div>
  <div class="info">
    <h3>📋 說明</h3>
    <p>→ 共 30 題，每題 4 個選項，選最接近你的那個</p>
    <p>→ 沒有對錯，沒有好壞，每個選項都是正常的生活選擇</p>
    <p>→ 不要想太久，選你「通常會怎麼做」，不是「覺得應該怎麼做」</p>
  </div>
  <div class="info">
    <h3>📊 你會得到什麼</h3>
    <p>→ 三條軸的分數：做事風格、能量來源、內心羅盤</p>
    <p>→ 你的類型代碼和描述</p>
    <p>→ 每條軸 -10 到 +10 的連續光譜，中間也是一種類型</p>
  </div>
  <button class="btn btn-go" onclick="startQuiz()">開始作答</button>
</div>

<div id="quiz" class="hidden">
  <div class="prog">
    <div class="prog-bar"><div class="prog-fill" id="pFill"></div></div>
    <div class="prog-txt" id="pTxt">0 / 30</div>
  </div>
  <div id="qWrap"></div>
  <button class="btn btn-go" id="subBtn" onclick="calcResult()" disabled>查看結果</button>
</div>

<div id="result" class="hidden"></div>

<div class="ftr">
  個人決策風格問卷 V1 · <a href="https://github.com/94Mr-LIKE" target="_blank">GitHub</a>
</div>

</div>

<script>
// ============================
// QUESTION DATA (30 questions)
// ============================
var Q = [
{id:1, q:"你想買一個特定的東西，到了之後你通常會怎麼做？", opts:[
  {t:"直接去買，買完就走", s:{A:2}},

{id:14, q:"你的手機壞了，整天沒辦法用，結束之後你第一個感覺是？", opts:[

{id:15, q:"你到了一個完全陌生的地方（新的學校、新的社區），你通常會？", opts:[

{id:16, q:"有人當著很多人的面稱讚你做得很好，你的感覺是？", opts:[

var ans = {};
var TOTAL = Q.length;

// ============================
// RENDER QUESTIONS
// ============================
function renderQuestions() {
  var h = '';
  Q.forEach(function(q, i) {
    h += '<div class="qcard" id="qc_'+q.id+'">';
    h += '<div class="qnum">Q'+q.id+' / '+TOTAL+'</div>';
    h += '<div class="qtxt">'+q.q+'</div>';
    h += '<div class="opts">';
    q.opts.forEach(function(o, j) {
      h += '<div class="opt" onclick="pick('+q.id+','+j+')">';
      h += '<input type="radio" name="q'+q.id+'" value="'+j+'">';
      h += '<div class="dot"></div>';
      h += '<div class="opt-t">'+o.t+'</div></div>';
    });
    h += '</div></div>';
  });
  document.getElementById('qWrap').innerHTML = h;
}

function startQuiz() {
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQuestions();
  updProg();
}

function pick(qid, oidx) {
  var card = document.getElementById('qc_'+qid);
  card.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel')});
  card.querySelectorAll('.opt')[oidx].classList.add('sel');
  card.classList.add('done');
  ans[qid] = oidx;
  updProg();
  document.getElementById('subBtn').disabled = Object.keys(ans).length < TOTAL;
}

function updProg() {
  var n = Object.keys(ans).length;
  var pct = Math.round(n/TOTAL*100);
  document.getElementById('pFill').style.width = pct+'%';
  document.getElementById('pTxt').textContent = n+' / '+TOTAL;
}

// ============================
// SCORING
// ============================
function calcResult() {
  var raw = {A:0, B:0, C:0};
  var maxP = {A:0, B:0, C:0};
  var maxN = {A:0, B:0, C:0};

  // Calculate theoretical max/min
  Q.forEach(function(q) {
    var qMaxP = {A:0,B:0,C:0}, qMaxN = {A:0,B:0,C:0};
    q.opts.forEach(function(o) {
      ['A','B','C'].forEach(function(ax) {
        var v = o.s[ax] || 0;
        if (v > qMaxP[ax]) qMaxP[ax] = v;
        if (v < qMaxN[ax]) qMaxN[ax] = v;
      });
    });
    ['A','B','C'].forEach(function(ax) {
      maxP[ax] += qMaxP[ax];
      maxN[ax] += qMaxN[ax];
    });
  });

  // Sum raw scores
  Q.forEach(function(q) {
    var oidx = ans[q.id];
    if (oidx === undefined) return;
    var scores = q.opts[oidx].s;
    ['A','B','C'].forEach(function(ax) {
      raw[ax] += (scores[ax] || 0);
    });
  });

  // Normalize to -10 ~ +10
  var norm = {};
  ['A','B','C'].forEach(function(ax) {
    if (raw[ax] >= 0) {
      norm[ax] = maxP[ax] > 0 ? Math.round(raw[ax] / maxP[ax] * 100) / 10 : 0;
    } else {
      norm[ax] = maxN[ax] < 0 ? Math.round(raw[ax] / Math.abs(maxN[ax]) * 100) / 10 : 0;
    }
    norm[ax] = Math.max(-10, Math.min(10, norm[ax]));
  });

  // Determine type code
  var code = '';
  code += norm.A >= 2 ? 'G' : norm.A <= -2 ? 'P' : 'B';
  code += norm.B >= 2 ? 'E' : norm.B <= -2 ? 'I' : 'M';
  code += norm.C >= 2 ? 'S' : norm.C <= -2 ? 'O' : 'A';

  showResult(norm, raw, code);
}

  r += '</div>';

  // Axis explanations
  r += '<div class="res-card"><h3>📝 各軸解讀</h3>';
  r += buildAxisExplain('A', '做事風格', norm.A);
  r += buildAxisExplain('B', '能量來源', norm.B);
  r += buildAxisExplain('C', '內心羅盤', norm.C);
  r += '</div>';

  // Share
  r += '<div class="share-box"><p>你的類型代碼（點擊複製）</p>';
  r += '<div class="share-code" onclick="copyCode(this)">'+code+' '+t.name+'</div></div>';

  // Disclaimer
  r += '<div class="res-card" style="border-color:var(--tx3)">';
  r += '<p style="color:var(--tx3);font-size:.8rem;line-height:1.8">本問卷為探索性自我認識工具，不是心理診斷。結果反映你在 30 題上的作答傾向，不是你的全部。每個人都是獨特的，任何分類都是簡化。</p>';
  r += '</div>';

  r += '<button class="btn btn-alt" onclick="location.reload()">重新作答</button>';

  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').innerHTML = r;
  document.getElementById('result').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildAxis(ax, label, posLabel, negLabel, val, color) {
  var pct = (val + 10) / 20 * 100; // 0-100%
  var fillLeft, fillWidth;
  if (val >= 0) {
    fillLeft = 50;
    fillWidth = pct - 50;
  } else {
    fillLeft = pct;
    fillWidth = 50 - pct;
  }

  var h = '<div class="axis">';
  h += '<div class="axis-label"><span>'+label+'</span><span style="color:'+color+'">'+val.toFixed(1)+'</span></div>';
  h += '<div class="axis-track">';
  h += '<div class="axis-center"></div>';
  h += '<div class="axis-fill" style="left:'+fillLeft+'%;width:'+fillWidth+'%;background:'+color+';opacity:.4"></div>';
  h += '<div class="axis-marker" style="left:'+pct+'%;background:'+color+'"></div>';
  h += '</div>';
  h += '<div class="axis-ends"><span>'+negLabel+' (-10)</span><span>中間</span><span>'+posLabel+' (+10)</span></div>';
  h += '</div>';
  return h;
}

var AXIS_DESC = {
  A: {
    high: "在需要做取捨的時候，你傾向先推進度、先解決問題。人的感受你不是不在乎，但在時間有限的情況下，你會先處理事情。",
    mid: "你在「先做事」和「先顧人」之間沒有固定偏好，會根據當下的情況靈活切換。",
    low: "在需要做取捨的時候，你傾向先確認人的狀態。事情可以慢一點，但人不能不舒服。"
  },
  B: {
    high: "跟人在一起會讓你充電。獨處太久你會悶，你需要社交互動來維持精力。",
    mid: "你的能量來源不固定——有時候需要人、有時候需要獨處，取決於當下的狀態。",
    low: "社交活動會消耗你的能量，即使過程很開心。你需要獨處的時間來恢復。"
  },
  C: {
    high: "你很清楚自己想要什麼，外界的聲音不太容易改變你的判斷。你不是固執，而是內心有自己的標準。",
    mid: "你在「聽自己的」和「參考別人的」之間保持彈性。有些事你很有主見，有些事你願意順著大家。",
    low: "別人怎麼看你、怎麼想你，對你來說是很重要的考量。做決定的時候你會把身邊的人的反應納入考量。"
  }
};

function buildAxisExplain(ax, label, val) {
  var desc;
  if (val >= 3) desc = AXIS_DESC[ax].high;
  else if (val <= -3) desc = AXIS_DESC[ax].low;
  else desc = AXIS_DESC[ax].mid;

  var strength = '';
  var abs = Math.abs(val);
  if (abs >= 7) strength = '（非常明確的傾向）';
  else if (abs >= 4) strength = '（清楚的傾向）';
  else if (abs >= 2) strength = '（有傾向但不強烈）';
  else strength = '（中間帶）';

  var h = '<div class="type-detail">';
  h += '<h4>'+label+' '+strength+'</h4>';
  h += '<p>'+desc+'</p></div>';
  return h;
}

function copyCode(el) {
  var text = el.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  el.classList.add('copied');
  el.textContent = '已複製！';
  setTimeout(function(){
    el.classList.remove('copied');
    el.textContent = text;
  }, 1500);
}
</script>
